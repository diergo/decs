name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    strategy:
      matrix:
        jdk:
          - 8
          - 21
          - 25
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.jdk }}
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run build
        run: ./gradlew check
